upstream django_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80 default_server;
    server_name 98.88.189.220 _;
    
    client_max_body_size 10M;
    
    # Logs
    access_log /var/log/nginx/smartconnect-access.log;
    error_log /var/log/nginx/smartconnect-error.log;
    
    # Static files
    location /static/ {
        alias /home/ec2-user/prueba-/monitoreo/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Media files
    location /media/ {
        alias /home/ec2-user/prueba-/monitoreo/media/;
        expires 7d;
    }
    
    # API and web app
    location / {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
